spring.application.name=auction-service

server.port=${SERVER_PORT_AUCTION:8200}

# Redis connection (use env)
spring.data.redis.host=${AUCTION_REDIS_HOST:localhost}
spring.data.redis.port=${AUCTION_REDIS_PORT:6379}
spring.data.redis.username=${AUCTION_REDIS_USERNAME:default}
spring.data.redis.password=${AUCTION_REDIS_PASSWORD:1234}

eureka.instance.prefer-ip-address=true
#eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# RabbitMQ settings (using defaults for local deploy)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME:auction-service.exchange}

rabbitmq.queue.auction.creation=${RABBITMQ_QUEUE_AUCTION_CREATION:q.storage-service.auction.created}
rabbitmq.routing-key.auction.creation=${RABBITMQ_ROUTING_KEY_AUCTION_CREATION:auction.created}

rabbitmq.queue.auction.expire=${RABBITMQ_QUEUE_AUCTION_EXPIRE:q.auction-service.auction.expire}
rabbitmq.routing-key.auction.expire=${RABBITMQ_ROUTING_KEY_AUCTION_EXPIRE:auction.expire}

rabbitmq.queue.auction.status.update=${RABBITMQ_QUEUE_AUCTION_STATUS_UPDATE:q.storage-service.auction.status.update}
rabbitmq.routing-key.auction.status.update=${RABBITMQ_ROUTING_KEY_AUCTION_STATUS_UPDATE:auction.status.update}

rabbitmq.queue.auction.update=${RABBITMQ_QUEUE_AUCTION_UPDATE:q.storage-service.auction.update}
rabbitmq.routing-key.auction.update=${RABBITMQ_ROUTING_KEY_AUCTION_UPDATE:auction.update}

rabbitmq.queue.bid.placed=${RABBITMQ_QUEUE_BID_PLACED:q.storage-service.bid.placed}
rabbitmq.routing-key.bid.placed=${RABBITMQ_ROUTING_KEY_BID_PLACED:bid.placed}