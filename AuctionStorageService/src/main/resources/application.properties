spring.application.name=auction-storage-service

server.port=${AUCTION_STORAGE_SERVICE_PORT:8090}

spring.datasource.url=jdbc:postgresql://${AUCTION_DB_HOST:localhost}:${AUCTION_DB_PORT:5432}/${AUCTION_DB_NAME:AuctionStorageDB}
spring.datasource.username=${AUCTION_DB_USERNAME:postgres}
spring.datasource.password=${AUCTION_DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# RabbitMQ settings (using defaults for local deploy)
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}

rabbitmq.exchange.name=${RABBITMQ_EXCHANGE_NAME:auction.exchange}

rabbitmq.queue.auction.creation=${RABBITMQ_QUEUE_AUCTION_CREATION:q.storage-service.auction.created}
rabbitmq.routing-key.auction.creation=${RABBITMQ_ROUTING_KEY_AUCTION_CREATION:auction.created}

rabbitmq.queue.auction.expire=${RABBITMQ_QUEUE_AUCTION_EXPIRE:q.auction-service.auction.expire}
rabbitmq.routing-key.auction.expire=${RABBITMQ_ROUTING_KEY_AUCTION_EXPIRE:auction.expire}

rabbitmq.queue.auction.status.update=${RABBITMQ_QUEUE_AUCTION_STATUS_UPDATE:q.storage-service.auction.status.update}
rabbitmq.routing-key.auction.status.update=${RABBITMQ_ROUTING_KEY_AUCTION_STATUS_UPDATE:auction.status.update}

rabbitmq.queue.auction.update=${RABBITMQ_QUEUE_AUCTION_UPDATE:q.storage-service.auction.update}
rabbitmq.routing-key.auction.update=${RABBITMQ_ROUTING_KEY_AUCTION_UPDATE:auction.update}

rabbitmq.queue.bid.placed=${RABBITMQ_QUEUE_BID_PLACED:q.storage-service.bid.placed}
rabbitmq.routing-key.bid.placed=${RABBITMQ_ROUTING_KEY_BID_PLACED:bid.placed}

logging.level.org.springframework.amqp=DEBUG

# Monitoring config
# Expose health and metrics endpoints
management.endpoints.web.exposure.include=health,metrics,prometheus,info
# Show full health details (disk space, db status, etc.)
management.endpoint.health.show-details=always