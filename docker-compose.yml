services:
  postgres:
    image: postgres:17-alpine
    container_name: api-gateway-postgres
    environment:
      POSTGRES_DB: AuthServiceDB
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./AuthService/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d AuthServiceDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-gateway-network

  redis:
    image: redis:7-alpine
    container_name: api-gateway-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api-gateway-network

  discovery-service:
    build:
      context: .
      args:
        SERVICE_PATH: ./DiscoveryService
    container_name: discovery-service
    environment:
      - SERVER_PORT=${SERVER_PORT_DISCOVERY}
      - SPRING_APPLICATION_NAME=discovery-service
      - EUREKA_INSTANCE_HOSTNAME=discovery-service
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-service:${SERVER_PORT_DISCOVERY}/eureka/

      # standalone server mode
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_SERVER_ENABLE_SELF_PRESERVATION=false

    ports:
      - "${SERVER_PORT_DISCOVERY}:${SERVER_PORT_DISCOVERY}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${SERVER_PORT_DISCOVERY}/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - api-gateway-network

  auth-service:
    build:
      context: .
      args:
        SERVICE_PATH: ./AuthService
    container_name: auth-service
    environment:
      - SERVER_PORT=${SERVER_PORT_AUTH}
      - SPRING_APPLICATION_NAME=auth-service
      - SPRING_R2DBC_URL=r2dbc:postgresql://api-gateway-postgres:5432/AuthServiceDB
      - SPRING_R2DBC_USERNAME=${DB_USERNAME}
      - SPRING_R2DBC_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-service:${SERVER_PORT_DISCOVERY}/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

    depends_on:
      postgres:
        condition: service_healthy
      discovery-service:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:${SERVER_PORT_AUTH}/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

    networks:
      - api-gateway-network

  api-gateway:
    build:
      context: .
      args:
        SERVICE_PATH: ./APIGatewayService
    container_name: api-gateway
    environment:
      - SERVER_PORT=${SERVER_PORT_GATEWAY}
      - SPRING_APPLICATION_NAME=api-gateway
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_DATA_REDIS_USERNAME=${REDIS_USERNAME}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-service:${SERVER_PORT_DISCOVERY}/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

    ports:
      - "${SERVER_PORT_GATEWAY}:${SERVER_PORT_GATEWAY}"

    depends_on:
      redis:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy

    networks:
      - api-gateway-network
      
  admin-server:
    build:
      context: .
      args:
        SERVICE_PATH: ./AdminServer
    container_name: admin-server
    environment:
      - SERVER_PORT=9090
      - SPRING_APPLICATION_NAME=admin-server
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://discovery-service:${SERVER_PORT_DISCOVERY}/eureka/
      - SPRING_BOOT_ADMIN_DISCOVERY_SERVICES=*
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

    ports:
      - "9090:9090"

    depends_on:
      discovery-service:
        condition: service_healthy

    networks:
      - api-gateway-network

volumes:
  postgres_data:

networks:
  api-gateway-network:
    driver: bridge
