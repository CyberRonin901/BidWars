# Redis connection (use env)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:1234}
spring.data.redis.username=${REDIS_USERNAME:default}

# Logging config
logback.log.file.path=./logs/test
# Show only warnings and errors from the framework
logging.level.org.springframework.cloud.gateway=WARN
# Keep your custom logic at INFO or DEBUG so you can see your Upstream/Downstream logs
logging.level.com.server.gateway=INFO

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka